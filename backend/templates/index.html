<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IT Asset Management System</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <h1>IT Department Asset Manager</h1>

    <section>
        <h2>Add a New Device</h2>
        <input type="text" id="assetName" placeholder="Device Name (e.g., MacBook Pro)">
        <input type="text" id="assetSerial" placeholder="Serial Number (Unique code)">
        <input type="text" id="assetStatus" placeholder="Status (e.g., In Stock)">
        <button onclick="createAsset()">Add Asset</button>
    </section>

    <section>
        <h2>Current Device Inventory</h2>
        
        <div style="margin-bottom: 15px;">
            <label for="assetSearch"><strong>Quick Filter Assets: </strong></label>
            <input type="text" id="assetSearch" onkeyup="filterAssets()" placeholder="Type names, codes or status keywords...">
        </div>

        <button onclick="loadAssets()">Refresh Inventory</button>
        <table border="1">
            <thead>
                <tr>
                    <th>Device Name</th>
                    <th>Serial Number</th>
                    <th>Current Status</th>
                    <th>Management Actions</th>
                </tr>
            </thead>
            <tbody id="assetTableBody">
                </tbody>
        </table>
    </section>

    <script src="/static/app.js"></script>
</body>
</html>
