<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IT Asset Management System</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

    <header class="app-header">
    <div class="brand">
        <span class="company-name">Sysco Labs</span>
        <span class="app-title">Enterprise Asset Management Portal</span>
    </div>
</header>

<div class="metrics-container">
    <div class="card metric-card">
        <h3>Total Assets</h3>
        <p id="total-assets-count">0</p>
    </div>
    <div class="card metric-card">
        <h3>In Use</h3>
        <p id="in-use-count">0</p>
    </div>
    <div class="card metric-card">
        <h3>Available</h3>
        <p id="available-count">0</p>
    </div>
</div>

<div class="main-layout">

    <selection class="control-panel">
        <h2>Add a new Device</h2>
        <div class=" from-group">
            <input type="text" id="assetName" placeholder="Device Name (e.g., MacBook Pro)">
            <input type="text" id="assetSeriel" Placeholder="Serial Number (Unique code)">
            <input type="text" id="assetStatus" placeholder="Status(e.g, In Stock)">
            <button class="btn btn-primary" onclick="createAsset()">AddAsset</button>
        </div>
    </selection>

    <section class="inventory-panel">
        <h2>Current Device inventory-panel</h2>

        <div class="filter-actions-bar">
            <div class="search-box"
                <label for="assetSearch"><strong>Quick Filter Assets: </strong></label>
                <input type="text" id="assetSearch" onkeyup="filterAssets()" placeholder="Type names, codes or status keywords....">
                </div>
                <button class="btn btn-secondary" onclick="loadAssets()">Refresh Inventory</button>
            </div>

            <div class="table-container">
                <tale>
                    <thead>
                        <tr>
                            <tr>
                                <th>Device Name</th>
                                <th>Serial Number</th>
                                <th>Current Status</th>
                                <th>Management Actions</th>
                            </tr>
                        </thead>
                        </tbody id="assetTableBody">
                            </tbody>
                    </table>
                </tale>
            </div>
        </selection>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
