<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IT Asset Management System</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

    <header class="app-header">
    <div class="brand">
        <span class="company-name">Sysco Labs</span>
        <span class="app-title">Enterprise Asset Management Portal</span>
    </div>
</header>

<div class="metrics-container">
    <div class="card metric-card">
        <h3>Total Assets</h3>
        <p id="total-assets-count">0</p>
    </div>
    <div class="card metric-card">
        <h3>In Use</h3>
        <p id="in-use-count">0</p>
    </div>
    <div class="card metric-card">
        <h3>Available</h3>
        <p id="available-count">0</p>
    </div>
</div>

<div class="main-layout">

        <section class="control-panel">
            <h2>Add a new Device</h2>
            <div class="form-group"> <input type="text" id="assetName" placeholder="Device Name (e.g., MacBook Pro)">
                <input type="text" id="assetSerial" placeholder="Serial Number (Unique code)"> <input type="text" id="assetStatus" placeholder="Status(e.g, In Stock)">
                <button class="btn btn-primary" onclick="createAsset()">Add Asset</button>
   </div>
        </section> <section class="inventory-panel">
            <h2>Current Device Inventory</h2>

        <div class="filter-actions-bar">
        <div class="search-box">
             <label for="assetSearch"><strong>Quick Filter Assets: </strong></label>
             <input type="text" id="assetSearch" onkeyup="filterAssets()" placeholder="Type names, codes or status keywords....">
        </div>
        <div class="action-buttons-group">
            <button class="btn btn-secondary" onclick="loadAssets()">Refresh Inventory</button>
            <button class="btn btn-export" onclick="exportCSVReport()">Export Audit Report</button>
         </div>
</div>

            <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Device Name</th>
                        <th>Serial Number</th>
                        <th>Current Status</th>
                        <th>Management Actions</th>
                    </tr>
                </thead>
                <tbody id="assetTableBody">
                </tbody>
            </table>
        </div>
        </section>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
